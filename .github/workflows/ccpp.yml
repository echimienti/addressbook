name: C/C++ CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: install build-essential cmake
      run: sudo apt-get update && sudo apt-get install -y build-essential cmake lcov doxygen
    - name: install gtest
      run: |
          echo "Installing libgtest-dev"
          sudo apt-get install -y libgtest-dev
          echo "cd to usr/src/gtest"
          cd /usr/src/gtest
          sudo cmake CMakeLists.txt
          sudo make
          echo "cp compiled gtest files to /usr/lib"
          sudo find . -name "*.a" -exec cp {} /usr/lib \;
          echo "cd back to home dir"
          cd ~
    - uses: actions/checkout@v4
      with:
        ref: master
    - name: init submodule
      run: git submodule update --init --recursive
    - name: make
      run: make
    - name: make test
      run: make test
    - name: get code coverage
      run: |
          cd tests/
          g++ -o main -g -fprofile-arcs -ftest-coverage -L /usr/lib -I/usr/include main_test.cpp -lgtest -lpthread
          ./main
          gcov main_test.cpp
          mkdir](#)
